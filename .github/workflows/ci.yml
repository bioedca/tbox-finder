# ─── tbox-finder CI (CLAUDE.md §8.6, ADR-0002) ────────────────────────────────
# Runs on every push to a feature branch and every PR to `main`. CLAUDE.md §5.1
# keeps `main` green: it only ever receives squash-merges via PR, never direct
# pushes, so `push` is scoped to feature branches (`branches-ignore: main`).
#
# Jobs (lint/dag/test run per-push+PR; docker is schedule/release only):
#   lint   — ruff check + black --check. ruff/black/pytest are isolated dev
#            tools (in NO science env — the conda-lock/git-lfs precedent),
#            pinned to the versions run locally at P0-05..P0-07.
#   dag    — snakemake --lint + snakemake -n (DAG dry-run) inside the committed
#            `data` conda-lock env (snakemake 9.23.1; CLAUDE.md §3.2 rule=env),
#            reproduced with conda-lock 4.0.2 exactly as docker/Dockerfile does.
#   test   — pytest tests/{unit,golden,ml} (smoke-sized; target < ~8 min total).
#            The no-leakage (§8.2, P0-24) + eval-gate (§8.4, P0-31) gates are
#            blocking here. P0-31 adds the pinned science stack (numpy/pandas/
#            scikit-learn == envs/data.yml) so the golden per-stage hashes and
#            the eval-gate real-fixture tier RE-RUN in CI (not skip); DVC-only
#            data tests still skip (existence-guarded), never error.
#   docker — build + push the ML reproducibility image (ADR-0002 D4) to GHCR on
#            a schedule/release (or manual dispatch) ONLY — never per-PR.
# Red CI blocks merge (CLAUDE.md §5.1, §8.6): a red run is a phase-exit blocker.
name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1" # weekly Mon 06:00 UTC — drives the `docker` job only
  release:
    types: [published]
  workflow_dispatch: {} # manual trigger (e.g. to validate the `docker` build)

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false # no job pushes via git; drop the token
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pinned linters
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.15.15" "black==25.11.0"
      - name: ruff check
        run: ruff check .
      - name: black --check
        run: black --check src tests scripts

  dag:
    name: snakemake (lint + dry-run)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0} # login shell so conda is on PATH in every step
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false # no job pushes via git; drop the token
      - name: Set up Miniforge (base)
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          channel-priority: strict
      - name: Install conda-lock (pinned) into base
        run: conda install -n base -y -c conda-forge conda-lock=4.0.2
      - name: Reproduce the `data` env from its committed lock
        run: conda run -n base conda-lock install --name data --mamba envs/data.conda-lock.yml
      - name: snakemake --lint
        run: conda run -n data snakemake --lint -s workflow/Snakefile
      - name: snakemake -n (DAG dry-run)
        run: conda run -n data snakemake -n -s workflow/Snakefile

  test:
    name: pytest (unit + golden + ml, smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false # no job pushes via git; drop the token
          lfs: true # smudge the committed split-assignment table so the P0-24
          #          no-leakage gate reads the REAL partition, not an LFS pointer
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package (editable) + pinned pytest + science stack
        run: |
          python -m pip install --upgrade pip
          # pyarrow: the stdlib has no parquet reader. numpy/pandas/scikit-learn:
          # P0-31 makes the golden per-stage hashes + the eval-gate real-fixture tier
          # RE-RUN in CI (they importorskip these, so without them they skip silently).
          # hydra-core/omegaconf: same anti-skip contract for the P2-09 sbatch-override
          # gate (tests/unit/test_sbatch_overrides.py), which composes every shipped
          # sbatch's real CLI overrides. Without them it importorskips GREEN — and that
          # gate exists precisely because SLURM job 669 died on an override the config
          # lacked, after a ~9 h queue wait, with the whole suite passing.
          # All pinned == envs/data.yml so the CI reader/metric kernels match the
          # writer/data env bit-for-bit (isolated CI tools, the conda-lock/git-lfs
          # precedent — NOT a science-env / ML-stack change). CLAUDE.md §3.1/§8.6.
          pip install -e . "pytest==9.0.2" "pyarrow==24.0.0" \
            "numpy==2.5.1" "pandas==2.3.3" "scikit-learn==1.9.0" \
            "hydra-core==1.3.2" "omegaconf==2.3.0"
      - name: pytest
        env:
          # Fail (never silently skip) if the committed table is unreadable here — the
          # load-bearing §8.2 no-leakage gate must not rot. tests/ml/test_no_leakage.py.
          TBOX_REQUIRE_NO_LEAKAGE: "1"
          # Same anti-rot contract for the §8.4 eval-gate harness: with the science stack
          # installed above, a missing stack/fixture FAILS (not skips). tests/ml/test_eval_gate.py.
          TBOX_REQUIRE_EVAL_GATE: "1"
          # Same anti-rot contract for the ADR-0002 A7 reproducibility gate: both the P1-07 and
          # the P1-08 re-run reports are committed, so a missing/malformed one FAILS (not skips).
          # tests/ml/test_smoke_reproducible.py (a pure-JSON comparison, no torch).
          TBOX_REQUIRE_REPRO_GATE: "1"
          # Same anti-rot contract for the PRD §10.2 condition-(b) VRAM gate: the measured
          # P1-16 report is committed, so a missing/malformed one FAILS (not skips).
          # tests/ml/test_lora_smoke.py Tier 3 (a pure-JSON check, no torch). NOTE: the torch
          # tier of that file has its OWN var (TBOX_REQUIRE_LORA_TORCH), deliberately NOT set
          # here — CI installs no torch, so arming it would fail every run.
          TBOX_REQUIRE_LORA_SMOKE: "1"
          # Same anti-rot contract for the P2-04 Stage-1 training-entrypoint smoke: the
          # measured report is committed, so a missing/malformed one FAILS (not skips).
          # tests/ml/test_train_smoke.py's committed-report tier (pure JSON, no torch).
          # NOTE: the torch / Hydra / CUDA tiers of that file have their OWN vars
          # (TBOX_REQUIRE_TRAIN_TORCH / _HYDRA / _CUDA), deliberately NOT set here — CI
          # installs neither torch nor hydra, so arming them would fail every run. That
          # split is the P1-16 landmine: one var guarding both a pure tier and a heavy tier
          # cannot be armed at all.
          TBOX_REQUIRE_TRAIN_SMOKE: "1"
          # P2-05: the committed sizing report + its per-point A4000 measurements. Safe to
          # arm in bare CI because the whole sizing tier is torch-free by construction (a
          # pure aggregator over recorded JSON) — the P1-16 split does not apply here.
          TBOX_REQUIRE_SIZING_SMOKE: "1"
          # P2-06: the 36 committed sweep-point reports + the selection artifact + the
          # conf/ overlay they promote. Pure JSON/text (the reducer is torch-free and the
          # overlay assertions read the YAML as text), so the whole tier is arm-able in bare
          # CI. NOTE: the Hydra composition tier of that file has its OWN var
          # (TBOX_REQUIRE_SWEEP_HYDRA), deliberately NOT set here — CI installs no hydra, so
          # arming it would fail every run (the P1-16 split).
          TBOX_REQUIRE_SWEEP_SELECTION: "1"
        run: pytest tests/unit tests/golden tests/ml

  docker:
    name: build ML image (GHCR)
    # Never publish an image from a state that fails the quality gates: only
    # build/push after lint+dag+test succeed (they run on schedule/release too,
    # having no event `if`). Composes with the event gate below — on PR/push the
    # job stays `if`-skipped regardless of these deps.
    needs: [lint, dag, test]
    # Reproducibility/archival artifact, NOT the cluster runtime (ADR-0002 D4,
    # CLAUDE.md §3.1). Built on schedule/release (or manual dispatch) only —
    # never per-PR (CLAUDE.md §8.6). NOTE (P0-08): the image is ~34.6 GB (P0-07);
    # whether it fits a GitHub-hosted runner's disk is validated on the first
    # scheduled / dispatched run, not on this PR (the docker job is `if`-skipped
    # here). A disk-reclaim step below buys headroom for that first build.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false # no job pushes via git; drop the token
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

# ─── tbox-finder CI (CLAUDE.md §8.6, ADR-0002) ────────────────────────────────
# Runs on every push to a feature branch and every PR to `main`. CLAUDE.md §5.1
# keeps `main` green: it only ever receives squash-merges via PR, never direct
# pushes, so `push` is scoped to feature branches (`branches-ignore: main`).
#
# Jobs (lint/dag/test run per-push+PR; docker is schedule/release only):
#   lint   — ruff check + black --check. ruff/black/pytest are isolated dev
#            tools (in NO science env — the conda-lock/git-lfs precedent),
#            pinned to the versions run locally at P0-05..P0-07.
#   dag    — snakemake --lint + snakemake -n (DAG dry-run) inside the committed
#            `data` conda-lock env (snakemake 9.23.1; CLAUDE.md §3.2 rule=env),
#            reproduced with conda-lock 4.0.2 exactly as docker/Dockerfile does.
#   test   — pytest tests/{unit,golden,ml} (smoke-sized; target < ~8 min total).
#            The no-leakage (§8.2) + eval-gate (§8.4) tests become blocking here
#            as P0-24 / P0-31 land; today tests/{golden,ml} carry scaffold
#            placeholders so the job is green (not exit 5 "no tests collected").
#   docker — build + push the ML reproducibility image (ADR-0002 D4) to GHCR on
#            a schedule/release (or manual dispatch) ONLY — never per-PR.
# Red CI blocks merge (CLAUDE.md §5.1, §8.6): a red run is a phase-exit blocker.
name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1" # weekly Mon 06:00 UTC — drives the `docker` job only
  release:
    types: [published]
  workflow_dispatch: {} # manual trigger (e.g. to validate the `docker` build)

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false # no job pushes via git; drop the token
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pinned linters
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.15.15" "black==25.11.0"
      - name: ruff check
        run: ruff check .
      - name: black --check
        run: black --check src tests scripts

  dag:
    name: snakemake (lint + dry-run)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0} # login shell so conda is on PATH in every step
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false # no job pushes via git; drop the token
      - name: Set up Miniforge (base)
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          channel-priority: strict
      - name: Install conda-lock (pinned) into base
        run: conda install -n base -y -c conda-forge conda-lock=4.0.2
      - name: Reproduce the `data` env from its committed lock
        run: conda run -n base conda-lock install --name data --mamba envs/data.conda-lock.yml
      - name: snakemake --lint
        run: conda run -n data snakemake --lint -s workflow/Snakefile
      - name: snakemake -n (DAG dry-run)
        run: conda run -n data snakemake -n -s workflow/Snakefile

  test:
    name: pytest (unit + golden + ml, smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false # no job pushes via git; drop the token
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package (editable) + pinned pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e . "pytest==9.0.2"
      - name: pytest
        run: pytest tests/unit tests/golden tests/ml

  docker:
    name: build ML image (GHCR)
    # Never publish an image from a state that fails the quality gates: only
    # build/push after lint+dag+test succeed (they run on schedule/release too,
    # having no event `if`). Composes with the event gate below — on PR/push the
    # job stays `if`-skipped regardless of these deps.
    needs: [lint, dag, test]
    # Reproducibility/archival artifact, NOT the cluster runtime (ADR-0002 D4,
    # CLAUDE.md §3.1). Built on schedule/release (or manual dispatch) only —
    # never per-PR (CLAUDE.md §8.6). NOTE (P0-08): the image is ~34.6 GB (P0-07);
    # whether it fits a GitHub-hosted runner's disk is validated on the first
    # scheduled / dispatched run, not on this PR (the docker job is `if`-skipped
    # here). A disk-reclaim step below buys headroom for that first build.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false # no job pushes via git; drop the token
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

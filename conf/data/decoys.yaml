# §9.1 static decoy / negative-pool construction — seeded config (P0-30).
# Drives: src/tbox_finder/decoys.py (rule build_decoys) + src/tbox_finder/masking.py.
# ADR pins: ADR-0005 D7 (single pinned benchmark decoy prevalence 100:1 — a GATE-1
# benchmark knob applied in P4, NOT here) + D14, ADR-0006 D11 (masking + spare rule).
# PRD §9.1 (the four pools + masking) / §13.3 (masking reference) / §7.2 (union prior).
#
# This file carries the *stochastic* + *sizing* controls only; no gate threshold lives
# here. The four §9.1 pools are training/benchmark negatives (distinct from the P5/§12
# genome-scale FDR nulls). The dinucleotide-shuffle seed the P0-30 spec calls out is the
# same top-level `seed` below, threaded into a per-pool sub-seed in decoys.py.
#
# Seeding (CLAUDE.md §8.3): every stochastic step passes an explicit seed.

seed: 42
pythonhashseed: 0

# Loci masking (PRD §9.1 "plus a flank"; ADR-0006 D11). Flank (nt) added on each side
# of every known-T-box locus before masking a pool record. Default pinned in code
# (masking.DEFAULT_FLANK_NT); overridable here.
flank_nt: 50

# Pool 1 — GC + length-matched 0th-order composition background. Number of decoys
# generated by bootstrapping the P0-12 T-box (GC, length) joint distribution.
gc_background_n: 2000

# Pool 3 — dinucleotide-shuffled positives (Altschul & Erikson 1985 random-Eulerian
# walk; DOI:10.1093/oxfordjournals.molbev.a040370). `dinuc_n_sources` positives are
# seed-sampled and each shuffled `dinuc_per_source` times.
dinuc_n_sources: 1000
dinuc_per_source: 2

# Pool 2 — other structured RNAs (Rfam). Per-family seeded subsample cap of the
# checksummed EBI-FTP fetch. Families (name -> RFAM acc) are pinned in
# decoys.RFAM_FAMILIES: SAM RF00162, TPP RF00059, tRNA RF00005, purine RF00167,
# FMN RF00050, glycine RF00504.
rfam_per_family_cap: 500
# Records scanned per family before subsampling — bounds download/memory on huge
# families (tRNA RF00005 full ≈ 950k seqs / 171 MB gz); the gz is streamed lazily so
# an early stop downloads only the scanned prefix.
rfam_max_scan: 20000

# Pool 4 — 5'UTR / tRNA-adjacent leader decoys: the fixed external anchor is the
# tboxevo idtm_validation_negatives.fasta (8 records), staged via `fetch-refs`.

# --------------------------------------------------------------------------- #
# P2-10b — the coordinate-bearing mining substrate (rule build_mining_pool;
# src/tbox_finder/mining/pool.py). NOT a fifth PRD §9.1 negative class: the four
# pools above are training/benchmark negatives, this is the ADR-0005 D14 mining
# loop's candidate substrate, written to its own artifact.
#
# Windows are carved from the P2-00 flank_context regions, so each carries a real
# (accession, locus_start, locus_end, strand) on a replicon that hosts a known
# T-box — which is what gives the union-prior mask something to find.
# P2-10d′-a: 300 → 1024. The mining pool's whole purpose is to supply §9.1
# training negatives, and Stage-1's training window is 1024 nt (PRD §6 / ADR-0001
# D31 / ADR-0005 D3), so a 300-nt window is not injectable at all — `background_record`
# refuses the length mismatch by design. `p2_flank_context` derives its `--pad-nt`
# from this value plus `mining_margin_nt` (workflow/rules/data.smk::_flank_pad_nt).
mining_window_nt: 1024
# A flank must exceed the window by this margin before a window is carved from it,
# so a carved window never abuts the locus it was taken beside.
mining_margin_nt: 50
# Locus-centred designed-control windows. Each overlaps a known T-box BY
# CONSTRUCTION, so the gate requires 100% of them to mask: anything less is a
# coordinate-frame defect, not a biological result. They are tagged
# `is_designed_control` and excluded from the natural contamination rate.
mining_n_controls: 500

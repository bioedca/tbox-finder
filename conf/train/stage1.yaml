# @package _global_
# train/stage1.yaml — P2-04 Stage-1 per-nucleotide 8-class segmentation training entrypoint
# (PRD §10.1/§10.3/§11/§16; ADR-0002 D7 + A6/A7; ADR-0005 D3/D15).
#
# `@package _global_` lifts this nested (conf/train/) primary config's keys to the root so
# `cfg.seed`/`cfg.epochs`/… are top-level (a config in a subdirectory is otherwise packaged
# under `train`); the `/data` `/model` `/tracking` `/optim` groups keep their own packages.
# Both halves are mandatory — without the package directive AND the leading-slash defaults,
# a conf/<group>/ primary silently fails to compose and you get a config that looks fine and
# reaches nothing.
#
# Drives: src/tbox_finder/train/train_stage1.py::main (Hydra entry) → train_stage1.
# Overridable on the CLI, e.g. `epochs=10 optim.lr=3e-4 gamma=1.0`, and swept at P2-06 via a
# SLURM --array over `slurm/p2/sweep_stage1.sbatch` (one DDP×8 point per task, NOT literal Hydra
# `--multirun`). The realized P2-06 axes are γ × optim.lr × class_weight_alpha (the code-emitted
# `swept_by` map below, train_stage1.py::build_report). window/stride is HELD at ADR-0005 D3+A3's
# 1024/512, and RC-combination + CRF are DEFERRED to P2-12 (line 70; swept_by=P2-12) — so the
# stale PRD §11 "six-axis"/"window+RC" framing does NOT describe this sweep.
#
# Launched by a hand-authored sbatch under slurm/ through the CLAUDE.md §9.3 submit-ack
# protocol — NOT the Snakemake SLURM executor (PRD §16: it submits programmatically and
# auto-retries, bypassing the --test-only preflight and the no-auto-resubmit rule). W&B logs
# offline on the compute node; `setup.smk::wandb_sync` uploads from the login node.
#
# NOTHING IN THIS FILE IS AUTHORITATIVE OVER CODE. The pinned quantities are frozen in their
# own modules and no config can weaken them (the ADR-0002 A5 precedent):
#   - backbone repo_id + revision  → models/caduceus_backbone.py (rejects any other revision)
#   - 1024/512 window geometry     → data/window_dataset.py (ADR-0005 D3)
#   - non-averaged RC-combination  → models/rc_combine.py ("mean" rejected; ADR-0005 D15)
#   - reconciliation operator      → infer/reconcile.py (ADR-0005 A3; no config override)

defaults:
  - _self_
  - /data: stage1        # P2-01's datamodule — this is the step that wires it (was unwired)
  - /model: caduceus_stage1
  - /tracking: wandb
  - /optim: stage1

# Determinism (§8.3; ADR-0002 A6). Metric-level, not bitwise: the Mamba selective_scan
# kernel registers no deterministic algorithm (A2 C2), so set_determinism runs
# use_deterministic_algorithms(True, warn_only=True). See train/repro.py.
seed: 42
pythonhashseed: 0

# ── Footprint (PRD §10.3) ────────────────────────────────────────────────────────────────
# PRD §10.3 pins "full fine-tune fits one GPU with gradient checkpointing; DDP×8 for
# throughput". The pinned checkpoint does NOT support the standard HuggingFace path —
# measured at P2-04 on revision d89eeb85: supports_gradient_checkpointing is False,
# gradient_checkpointing_enable() raises, and modeling_caduceus.py carries a literal
# "# TODO: Add support for gradient checkpointing" above its layer loop. So it is hand-wired
# per RCPSMambaBlock in train_stage1.py::enable_gradient_checkpointing (the ADR-0002 A2 C2
# idiom: "a code change, not a flag"), default ON per §10.3 — user sign-off 2026-07-16.
# MEASURED (batch 8, 1024 nt, laptop RTX 4060): peak VRAM 4.424 → 0.961 GiB, grads finite,
# loss 1.5939 → 1.5940. Throughput cost is UNMEASURED — P2-05 owns the A4000 footprint and
# may propose flipping this default with an ADR note.
gradient_checkpointing: true

# ── Optimisation — implementer defaults, swept at P2-06 (no ADR pins any of them) ─────────
epochs: 1
batch_size: 4
grad_clip: 1.0

# ── Objective (P2-02 Stage1Loss) ─────────────────────────────────────────────────────────
# γ≈2 is PRD §11's stated starting value for the dense-background regime and is TUNED
# (P2-06 sweeps it; safe below γ=1 since P2-02 fixed the silent NaN gradient at 0<γ<1).
gamma: 2.0
# class_weight_alpha 0 ⇒ unweighted focal CE. When > 0, train_stage1.py supplies
# class_counts COMPUTED FROM THE CONFIGURED STREAM — never from labels_report.json, whose
# locus-only totals put background at 31.5% against the real windowed stream's 78.68%
# (P2-02's measurement) and would misweight every class. Grade α against
# objective.loss_mass_share, not the exponent: at α=1 every class takes exactly 1/8 of the
# loss by construction, handing half the loss to the four classes ADR-0004 D6 excludes.
class_weight_alpha: 0.0
use_crf: false      # Linear seg head (P1-03 default); linear-vs-CRF is the P2-12 ablation
crf_weight: 1.0
dropout: 0.0
# rc_combine is single-sourced to the /model group (caduceus_stage1.yaml: rc_combine.mode);
# override via `model.rc_combine.mode=gate`. "mean" is rejected in code (ADR-0005 D15).

# ── Stream shaping ───────────────────────────────────────────────────────────────────────
# null ⇒ the full 8,303-record nested_train fold. The smoke overrides these to compose in
# seconds; P2-09's production run leaves them null.
steps_per_epoch: null
max_records: null
num_workers: 0

# ── The validation ladder (P2-06a) ───────────────────────────────────────────────────────
# The rung P2-06 promotes its best config on: the P2-06a inner-rung val fold — a
# cluster-grouped seeded carve from INSIDE the ADR-0004 D5 nested_train fold. 830 records /
# 469 homology-cluster blocks / 5 class-II on the committed table (fraction 0.10, seed
# 20260717). It is safe to tune on because it sits inside nested_train, whose complement IS
# the leave-one-order-out holdout — so the PRD §12:241 headline stays genuinely held out
# (user decision 2026-07-17, RE-TAKEN the same day: the first definition filtered
# `fold_random==val & not nested_train` and landed 88.4% inside that holdout). A nested
# design — the inner rung here, the outer rung at P2-14. The carve costs 10.0% of the
# training fold (8,303 → 7,472); train_stage1 loads `inner_train` by default.
#
# ⚠ This is the ONLY per-run number a sweep may rank on. Training loss is a function of
# `gamma` and `class_weight_alpha` themselves, so ranking P2-06's γ/α grid on loss would
# compare objectives rather than models.
# Which side of the P2-06a carve trains. true (default) ⇒ the `inner_train` fold, 7,472
# records, selection_val held OUT — mandatory for anything that RANKS on the val rung
# (P2-06's sweep). false ⇒ the FULL 8,303-record D5 fold, and it is the production setting:
# once the config is selected the carve's reason is spent, so P2-09 trains all of it. That
# combination forfeits the val metric — there is no free held-out rung left (the LOO holdout
# is P2-14's grading set) — so `eval_val=false` is REQUIRED alongside it and
# Stage1TrainConfig.__post_init__ raises on `eval_val=true` + `exclude_selection_val=false`
# rather than reporting an in-sample number as "held out" (P2-09, user decision 2026-07-19).
#
# ⚠ THIS KEY MUST EXIST HERE, not just as a Stage1TrainConfig field. Hydra composes in
# struct mode, so a CLI `exclude_selection_val=false` against a config that lacks the key is
# a hard ConfigCompositionException ("Could not override … not in struct") — every rank dies
# in the first seconds. That is exactly how SLURM job 669 was lost: the field was added to
# the dataclass at P2-09 and the unit tests exercised `_cfg_from_mapping` with a plain dict,
# which never touches Hydra composition, so the gap was invisible until the run. The
# tests/unit/test_sbatch_overrides.py gate now composes every shipped sbatch's OWN override
# tokens; keep any new CLI-overridable field in this file and that gate green.
exclude_selection_val: true
eval_val: true
eval_batch_size: 8
# null ⇒ all 830 records. The smoke caps it; P2-06/P2-09 leave it null. A capped run
# records `full_fold: false` in its eval scope, and select_best REJECTS a non-full-fold
# point (a slice's min-F1 is not comparable to a full fold's).
eval_max_records: null
# Block-bootstrap replicates, resampled at the homology-cluster level (ADR-0005 D5).
eval_n_boot: 2000

# ── Mined-negative injection (P2-10d; PRD §9.1, ADR-0005 D14) ────────────────────────────
# ⚠ THESE FIVE KEYS MUST EXIST HERE, not just as Stage1TrainConfig fields — see the
# `exclude_selection_val` note above and SLURM job 669. tests/unit/test_sbatch_overrides.py
# composes every shipped sbatch's own override tokens against this file.
#
# null ⇒ positives only: the P2-04 / P2-06 / P2-09 stream, unchanged, and still the default.
# The pool schema is mining/pool.py's (candidate_id, sequence, masked, is_designed_control).
negative_pool_parquet: null
# The share of the EMITTED DRAW STREAM that must be negative — not a pool-size ratio. PRD
# §9.1's "~10:1 seed ratio" is 10/11 ≈ 0.909 in these units. The realized share is COUNTED
# off the emitted keys and gated by an exact integer identity re-derived in
# `train_stage1.derive_clauses`; there is deliberately no tolerance knob.
#
# Negatives bypass the PRD §11 curriculum entirely (data/negatives.py::MixedIndexSampler).
# Routing them through it would make the realized share ~N**(1 - 3*alpha) — N**0.25 at the
# shipped alpha=0.25 — so a 10x larger pool would move the mix by only ~1.78x while the
# config went on stating a ratio the sampler contradicts.
#
# The two fields are mutually required: a fraction with no pool cannot be honoured, and a
# pool with fraction 0 would be loaded and reported but never sampled. Both raise at config
# construction rather than being discovered in the gate.
negative_fraction: 0.0
negative_max_records: null   # cap the pool (the smoke needs a stream that composes in seconds)
# The §9.1 decoy parquet (P2-10d′-b; ADR-0005 A7). When set, each admitted decoy of a pool A7
# pin 3 embeds — `dinuc_shuffled`, `structured_rna` — is spliced at a random phase into one
# admitted mined window and appended to the negative arm, all positions labelled background.
# This is the user's R2 reading of §9.1 at W=1024: every decoy record is 57-550 nt, and
# background_record refuses a length mismatch, so without the embedding three of the four
# §9.1 classes have no referent at the training window at all.
#
# `gc_background` and `leader_decoy` take share 0 (A7 pins 4 and 5) — the first because the
# 15,708 real mined windows now serve §9.1's class 1 better than a 0th-order surrogate built
# when no genome panel existed, the second because all 8 of its records are T-box-derived and
# 2 are exact substrings of training positives. Both exclusions are enforced by name in
# data/embedding.py and a rename upstream is an error, not a silent pass.
#
# null ⇒ mined windows only. That is not a smaller run: it is a §9.1 training-ratio shortfall
# on three of the four classes, which is exactly the P2-09 non-delivery this step repairs.
negative_decoy_parquet: null

# ── Warm start (P2-10d) ──────────────────────────────────────────────────────────────────
# A bare state_dict written by this module (checkpoint_dir/stage1.pt). null ⇒ a fresh build
# from the pinned HF backbone — the round-0 path, and still the default. ADR-0005 D14's
# mining loop is iterative, so round N must continue round N-1's weights; without this every
# round would restart from scratch and the per-round Tier-2N halt/rollback comparison would
# be between unrelated runs. The load is byte-verified: every model tensor must equal the
# checkpoint's afterwards, and at least one must have differed before (the designed control).
init_from_checkpoint: null
# Score the P2-06a validation ladder BEFORE the first optimiser step. For a warm-started
# round these are the parent checkpoint's metrics, which is the baseline D14's halt/rollback
# rule needs. Requires eval_val=true.
eval_at_step0: false

# ── Outputs ──────────────────────────────────────────────────────────────────────────────
report_path: reports/p2/train_stage1_smoke.json
checkpoint_dir: checkpoints/p2/stage1
save_checkpoint: false
device: null   # null ⇒ cuda:$LOCAL_RANK when available, else cpu

# Hydra: keep the run CWD = the launch dir (repo root) so relative in/out paths resolve;
# no per-run output subdir (the sbatch manages node-local scratch + artifact publish).
#
# ⚠ P2-06 (the `--multirun` sweep) MUST scope `report_path` per job. Every sweep point
# inherits the single fixed `report_path` above, so concurrent jobs would clobber one
# another's report and the surviving file would be whichever job finished last — silently,
# and indistinguishable from a clean run. Override it per job, e.g.
#   report_path=reports/p2/sweep/${hydra:job.num}.json
# (raised at P2-04 review; left to P2-06, which owns the sweep and its output layout —
# P2-04 runs no multirun, and inventing a layout here would pre-empt that step's design.)
hydra:
  run:
    dir: .
  output_subdir: null

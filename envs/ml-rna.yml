# ml-rna env — Stage-2 RNA backbone (RiNALMo via multimolecule): GPU training / eval / scan.
# THE load-bearing RNA-side ML stack (ADR-0002 D2 + D3 + D5/A4). Runtime target:
# cluster RTX A4000 = Ampere sm_86, CUDA 12.x, driver 590.x (PRD §15). NOT the laptop.
#
# ==========================================================================================
# ENV SPLIT (ADR-0002 A4, 2026-07-08, user sign-off; D5 pre-registered resolution).
# The single `ml` env is non-viable: `multimolecule` 0.0.9 (the RiNALMo/RNA-FM transformers-
# native mirror, D5) at import time needs transformers 5.x — it imports `transformers.
# initialization`, a 5.0.0 feature absent in 4.57.5, and `RiNALMoModel` fails on 4.57.5
# (0.0.9 was uploaded 2026-02-02, AFTER transformers 5.0.0 2026-01-26 — P0-06b finding).
# But Stage-1 (Caduceus) caps transformers at 4.57.5 (v5 dropped torch.fx, breaking the
# trust_remote_code path). So Stage-1 (DNA) and Stage-2 (RNA) split into `ml-dna`
# (transformers 4.57.5) + `ml-rna` (this file, transformers 5.x newest).
#
# transformers-5 epoch (verified vs the conda-forge 5.13.0 recipe run-deps + PyPI Requires-Dist
# + the transformers v5.0.0 release notes, 2026-07-08; context7 §3.3):
#   - transformers 5.13.0 pins  huggingface_hub<2.0,>=1.5.0  |  tokenizers<=0.23.0,>=0.22.0
#     |  safetensors>=0.8.0  (v5 min: accelerate>=1.1.0, peft>=0.18.0, python>=3.10).
#   - huggingface_hub 1.x is the v5 line (httpx backend, hf_xet) — a major bump from ml-dna's 0.35.3.
#   - tokenizers 0.23.0 is ABSENT on conda-forge (it jumps 0.22.2 -> 0.23.1) and 0.23.1 exceeds
#     the <=0.23.0 cap, so 0.22.2 is the newest conda-forge tokenizers in-cap (same as ml-dna).
# Minimize-divergence design: ml-rna = ml-dna with EXACTLY three forced HF-core pin changes
# (transformers 4.57.5->5.13.0, huggingface_hub 0.35.3->1.22.0, safetensors 0.7.0->0.8.0) plus
# `multimolecule` added. Everything else is identical to ml-dna — accelerate 1.12.0 (hub cap
# >=0.21.0), peft 0.18.1 (transformers>=4.36.0, hub>=0.25.0), datasets 4.5.0 (hub >=0.25.0,<2.0)
# all already admit hub 1.x + transformers 5.x, so nothing else must move. Smaller surface = fewer
# ways for the two envs to drift.
#
# LOCKFILE: envs/ml-rna.conda-lock.yml produced on the laptop at P0-06c (conda-lock 4.0.2,
# -p linux-64). Installs with NO nvcc and NO GPU (prebuilt kernel wheels + URL-pinned torch
# closure, A2 C1 + A4/A3 — same rationale as ml-dna). The GPU kernel import/forward smoke
# (incl. `import selective_scan_cuda`, A2 C2) stays P1 (cluster A4000).
# ==========================================================================================
#
# Never bump the torch/kernel/transformers/multimolecule pins silently (ADR-0002 D8, CLAUDE.md §3.1).
name: tbox-ml-rna
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.12
  - numpy=2.5.1                    # identical numpy-2 ABI to the data/infernal/viz/ml-dna envs
  # HuggingFace stack — transformers-5 epoch (multimolecule 0.0.9 needs v5; ADR-0002 D5/A4):
  - transformers=5.13.0            # newest 5.x; the RNA-side ceiling is set by multimolecule (needs v5)
  - tokenizers=0.22.2              # transformers 5.13.0 caps <=0.23.0,>=0.22.0; 0.23.0 absent on cf, 0.23.1 over cap
  - huggingface_hub=1.22.0         # v5 line (1.x httpx); transformers 5.13.0 pins <2.0,>=1.5.0
  - safetensors=0.8.0              # transformers 5.13.0 pins >=0.8.0 (the v5 era; ml-dna is 0.7.0)
  - accelerate=1.12.0              # v5 min >=1.1.0 (allows hub 1.x: >=0.21.0); shared with ml-dna
  - peft=0.18.1                    # v5 min >=0.18.0 (needs transformers>=4.36.0, hub>=0.25.0); shared with ml-dna
  - deepspeed=0.18.5               # ZeRO-3 full-FT fallback; torch-coupled (same torch anchor as ml-dna)
  - datasets=4.5.0                 # multimolecule needs datasets; hub >=0.25.0,<2.0 (allows 1.x); shared with ml-dna
  - wandb=0.28.0                   # offline mode + login-node `wandb sync`
  - hydra-core=1.3.2               # run-config driver; keep omegaconf<2.4
  - omegaconf=2.3.0
  # Toolchain for DeepSpeed's JIT-built ZeRO ops vs in-env CUDA 12.x (ADR-0002 D2/D4/A2).
  # NOT for mamba-ssm — its sm_86 wheel is prebuilt (ADR-0002 A2 C1); Option B has no source build.
  - cuda-nvcc=12.8
  - ninja
  - packaging
  - setuptools>=61
  - pip
  - pip:
    # ── torch + its full cu128 pip closure, pinned by exact wheel URL (ADR-0002 A4/A3, P0-06b) ──
    # IDENTICAL closure to envs/ml-dna.yml (same torch 2.7.1+cu128 anchor). conda-lock 4.0.2 cannot
    # lock this stack via an index — it rejects an inline `--extra-index-url` line (PEP 508 parse
    # error) and its wheel-tag matcher omits `manylinux_2_27` (torch+cu128's nvidia deps ship ONLY
    # as _2_27 on PyPI and the pytorch index). Direct-URL pins bypass both (a URL wheel skips
    # version-index + tag matching). torch + all 15 transitive deps (14 nvidia CUDA-runtime libs +
    # triton, exact versions from torch 2.7.1+cu128's METADATA Requires-Dist). Every URL verified a
    # live asset (HTTP 206) on 2026-07-08. Frozen with the torch anchor under D8 — no piecemeal edits.
    - torch @ https://download.pytorch.org/whl/cu128/torch-2.7.1%2Bcu128-cp312-cp312-manylinux_2_28_x86_64.whl
    # torch 2.7.1+cu128 transitive CUDA runtime (nvidia's canonical index, pypi.nvidia.com):
    - nvidia-cuda-nvrtc-cu12 @ https://pypi.nvidia.com/nvidia-cuda-nvrtc-cu12/nvidia_cuda_nvrtc_cu12-12.8.61-py3-none-manylinux2010_x86_64.manylinux_2_12_x86_64.whl
    - nvidia-cuda-runtime-cu12 @ https://pypi.nvidia.com/nvidia-cuda-runtime-cu12/nvidia_cuda_runtime_cu12-12.8.57-py3-none-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
    - nvidia-cuda-cupti-cu12 @ https://pypi.nvidia.com/nvidia-cuda-cupti-cu12/nvidia_cuda_cupti_cu12-12.8.57-py3-none-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
    - nvidia-cudnn-cu12 @ https://pypi.nvidia.com/nvidia-cudnn-cu12/nvidia_cudnn_cu12-9.7.1.26-py3-none-manylinux_2_27_x86_64.whl
    - nvidia-cublas-cu12 @ https://pypi.nvidia.com/nvidia-cublas-cu12/nvidia_cublas_cu12-12.8.3.14-py3-none-manylinux_2_27_x86_64.whl
    - nvidia-cufft-cu12 @ https://pypi.nvidia.com/nvidia-cufft-cu12/nvidia_cufft_cu12-11.3.3.41-py3-none-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
    - nvidia-curand-cu12 @ https://pypi.nvidia.com/nvidia-curand-cu12/nvidia_curand_cu12-10.3.9.55-py3-none-manylinux_2_27_x86_64.whl
    - nvidia-cusolver-cu12 @ https://pypi.nvidia.com/nvidia-cusolver-cu12/nvidia_cusolver_cu12-11.7.2.55-py3-none-manylinux_2_27_x86_64.whl
    - nvidia-cusparse-cu12 @ https://pypi.nvidia.com/nvidia-cusparse-cu12/nvidia_cusparse_cu12-12.5.7.53-py3-none-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
    - nvidia-cusparselt-cu12 @ https://pypi.nvidia.com/nvidia-cusparselt-cu12/nvidia_cusparselt_cu12-0.6.3-py3-none-manylinux2014_x86_64.whl
    - nvidia-nccl-cu12 @ https://pypi.nvidia.com/nvidia-nccl-cu12/nvidia_nccl_cu12-2.26.2-py3-none-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
    - nvidia-nvtx-cu12 @ https://pypi.nvidia.com/nvidia-nvtx-cu12/nvidia_nvtx_cu12-12.8.55-py3-none-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
    - nvidia-nvjitlink-cu12 @ https://pypi.nvidia.com/nvidia-nvjitlink-cu12/nvidia_nvjitlink_cu12-12.8.61-py3-none-manylinux2010_x86_64.manylinux_2_12_x86_64.whl
    - nvidia-cufile-cu12 @ https://pypi.nvidia.com/nvidia-cufile-cu12/nvidia_cufile_cu12-1.13.0.11-py3-none-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
    - triton @ https://download.pytorch.org/whl/triton-3.3.1-cp312-cp312-manylinux_2_27_x86_64.manylinux_2_28_x86_64.whl
    # Prebuilt Ampere (sm_86) kernel wheels, pinned by exact GitHub release-asset URL
    # (cu12torch2.7 cxx11abiTRUE cp312 linux_x86_64; NOT on PyPI — a bare pin fetches the sdist +
    # invokes nvcc). Carried in ml-rna too so the RNA env's throughput/kernels match ml-dna's
    # (RiNALMo uses SDPA via multimolecule, so flash-attn is a selectable accelerator — A2 K1):
    - flash-attn @ https://github.com/Dao-AILab/flash-attention/releases/download/v2.8.3.post1/flash_attn-2.8.3.post1+cu12torch2.7cxx11abiTRUE-cp312-cp312-linux_x86_64.whl
    - causal-conv1d @ https://github.com/Dao-AILab/causal-conv1d/releases/download/v1.6.2.post1/causal_conv1d-1.6.2.post1+cu12torch2.7cxx11abiTRUE-cp312-cp312-linux_x86_64.whl
    - mamba-ssm @ https://github.com/state-spaces/mamba/releases/download/v2.2.6.post3/mamba_ssm-2.2.6.post3+cu12torch2.7cxx11abiTRUE-cp312-cp312-linux_x86_64.whl
    # RiNALMo / RNA-FM transformers-native mirror (ADR-0002 D5). 0.0.9 needs transformers 5.x
    # (the reason this env is split off ml-dna). Pulls chanfig>=0.0.105 + danling[torch]>=0.3.11
    # from PyPI (danling's torch extra is satisfied by the URL-pinned torch above):
    - multimolecule==0.0.9

# ml env — GPU training / eval / genome-scan (ADR-0002 D2 + D3). THE load-bearing ML stack.
# Runtime target: cluster RTX A4000 = Ampere sm_86, CUDA 12.x, driver 590.x (PRD §15). NOT the laptop.
#
# ==========================================================================================
# LOCKFILE DEFERRED TO P0-06 (ADR-0002 D3; P0-05 decision recorded 2026-07-08).
# envs/ml.conda-lock.yml is NOT generated at P0-05: under the signed-off Option-B anchor
# (torch 2.7.1) `mamba-ssm` 2.2.6.post3 has no prebuilt torch-2.7 wheel and its sdist carries
# no static metadata, so it MUST be source-built (nvcc + sm_86). The laptop has no nvcc and an
# sm_89 GPU, so this env cannot be locked/installed here. P0-06 (its ADR-native home: the sm_86
# wheel/build-availability check + the mamba-ssm source-build capture + the Option-A/B confirm)
# produces envs/ml.conda-lock.yml on the cluster or in the CI CUDA image. The kernel
# import/forward smoke is P1 (ADR-0002 D3). This file is the authored, faithful spec P0-06 locks.
# ==========================================================================================
#
# Never bump the torch/kernel/transformers/multimolecule pins silently (ADR-0002 D8, CLAUDE.md §3.1).
name: tbox-ml
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.12
  - numpy=2.5.1                    # identical numpy-2 ABI to the data/infernal/viz envs
  # HuggingFace stack — capped by the Caduceus trust_remote_code ceiling (ADR-0002 D2):
  - transformers=4.57.5            # ceiling: last 4.x; v5 breaks the Caduceus remote path (issue #44561)
  - tokenizers=0.22.2              # newest stable <= transformers' <=0.23.0 cap
  - huggingface_hub=0.35.3         # last 0.x; transformers 4.57.5 pins <1.0,>=0.34.0
  - safetensors=0.7.0              # era-matched to the 4.57 epoch
  - accelerate=1.12.0              # FSDP FULL_SHARD + DeepSpeed ZeRO-3 plugins (§10.3 full-FT fallback)
  - peft=0.18.1                    # LoRA all-linear + grad-checkpointing (§10.3 LoRA default)
  - deepspeed=0.18.5               # ZeRO-3 full-FT fallback; JIT-builds ops vs in-env CUDA 12.x
  - datasets=4.5.0
  - wandb=0.28.0                   # offline mode + login-node `wandb sync`
  - hydra-core=1.3.2               # run-config driver; keep omegaconf<2.4
  - omegaconf=2.3.0
  # Toolchain to source-build mamba-ssm for sm_86 and JIT DeepSpeed ops (ADR-0002 D3/D4):
  - cuda-nvcc=12.8
  - ninja
  - packaging
  - setuptools>=61
  - pip
  - pip:
    # torch anchor set by the kernel ecosystem (ADR-0002 D3, Option B). cu128 wheel index:
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch==2.7.1                 # resolves to the +cu128 build from the index above
    # Prebuilt Ampere (sm_86) kernel wheels — Dao-AILab GitHub release assets;
    # exact wheel-asset URLs (cu12torch2.7cxx11abiTRUE, cp312, linux_x86_64) confirmed at P0-06:
    - causal-conv1d==1.6.2.post1   # optional depthwise-conv accelerator (falls back to nn.Conv1d)
    - flash-attn==2.8.3.post1      # FA2 = the correct line for Ampere
    # SOURCE build (no torch-2.7 wheel; needs nvcc + sm_86) — built/captured at P0-06/CI, --no-build-isolation:
    - mamba-ssm==2.2.6.post3       # last pre-Mamba-3 (classic selective_scan; no Hopper deps)
    # RiNALMo/RNA-FM transformers-native mirror; era-matched to transformers 4.57.5:
    - multimolecule==0.0.9

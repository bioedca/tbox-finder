# ml env — GPU training / eval / genome-scan (ADR-0002 D2 + D3). THE load-bearing ML stack.
# Runtime target: cluster RTX A4000 = Ampere sm_86, CUDA 12.x, driver 590.x (PRD §15). NOT the laptop.
#
# ==========================================================================================
# LOCKFILE: laptop-lockable after the P0-06 finding (ADR-0002 Amendment A2, 2026-07-08).
# P0-05 deferred envs/ml.conda-lock.yml under the (then-believed) premise that Option-B
# `mamba-ssm` 2.2.6.post3 had no prebuilt torch-2.7 wheel and had to be source-built (nvcc + sm_86,
# absent on the sm_89/no-nvcc laptop). P0-06's empirical probe DISPROVED that premise: a prebuilt
# `mamba_ssm-2.2.6.post3+cu12torch2.7cxx11abiTRUE-cp312-cp312-linux_x86_64.whl` exists (A2 C1).
# With the three kernels pinned below by their exact GitHub release-asset URLs, Option B needs ZERO
# source builds and installs with no nvcc and no GPU — so this env is now lockable on the laptop.
# The actual `conda-lock` run (resolving the pip-URL wheels + the cu128 torch index) is the next
# focused step; the GPU kernel import/forward smoke stays P1 (ADR-0002 D3/A2). This file is the spec.
# ==========================================================================================
#
# Never bump the torch/kernel/transformers/multimolecule pins silently (ADR-0002 D8, CLAUDE.md §3.1).
name: tbox-ml
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.12
  - numpy=2.5.1                    # identical numpy-2 ABI to the data/infernal/viz envs
  # HuggingFace stack — capped by the Caduceus trust_remote_code ceiling (ADR-0002 D2):
  - transformers=4.57.5            # ceiling: last 4.x; v5 breaks the Caduceus remote path (issue #44561)
  - tokenizers=0.22.2              # newest stable <= transformers' <=0.23.0 cap
  - huggingface_hub=0.35.3         # last 0.x; transformers 4.57.5 pins <1.0,>=0.34.0
  - safetensors=0.7.0              # era-matched to the 4.57 epoch
  - accelerate=1.12.0              # FSDP FULL_SHARD + DeepSpeed ZeRO-3 plugins (§10.3 full-FT fallback)
  - peft=0.18.1                    # LoRA all-linear + grad-checkpointing (§10.3 LoRA default)
  - deepspeed=0.18.5               # ZeRO-3 full-FT fallback; JIT-builds ops vs in-env CUDA 12.x
  - datasets=4.5.0
  - wandb=0.28.0                   # offline mode + login-node `wandb sync`
  - hydra-core=1.3.2               # run-config driver; keep omegaconf<2.4
  - omegaconf=2.3.0
  # Toolchain for DeepSpeed's JIT-built ZeRO ops vs in-env CUDA 12.x (ADR-0002 D2/D4/A2).
  # NOT for mamba-ssm — its sm_86 wheel is prebuilt (ADR-0002 A2 C1); Option B has no source build.
  - cuda-nvcc=12.8
  - ninja
  - packaging
  - setuptools>=61
  - pip
  - pip:
    # torch anchor set by the kernel ecosystem (ADR-0002 D3, Option B). cu128 wheel index:
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch==2.7.1                 # resolves to the +cu128 build from the index above
    # Prebuilt Ampere (sm_86) kernel wheels, pinned by exact GitHub release-asset URL
    # (cu12torch2.7 cxx11abiTRUE cp312 linux_x86_64; these are NOT on PyPI — a bare version pin
    # would fetch the sdist and invoke nvcc). All three wheel-present at P0-06 (ADR-0002 A2 C1):
    # flash-attn 2.8.3.post1 (FA2 = the Ampere line; SDPA/eager fallback via multimolecule, A2 K1):
    - flash-attn @ https://github.com/Dao-AILab/flash-attention/releases/download/v2.8.3.post1/flash_attn-2.8.3.post1+cu12torch2.7cxx11abiTRUE-cp312-cp312-linux_x86_64.whl
    # causal-conv1d 1.6.2.post1 (optional depthwise-conv accelerator; degrades to nn.Conv1d):
    - causal-conv1d @ https://github.com/Dao-AILab/causal-conv1d/releases/download/v1.6.2.post1/causal_conv1d-1.6.2.post1+cu12torch2.7cxx11abiTRUE-cp312-cp312-linux_x86_64.whl
    # mamba-ssm 2.2.6.post3 (last pre-Mamba-3; selective_scan_cuda is load-bearing — NO pure-torch
    # module fallback, so the wheel is required, ADR-0002 A2 C2):
    - mamba-ssm @ https://github.com/state-spaces/mamba/releases/download/v2.2.6.post3/mamba_ssm-2.2.6.post3+cu12torch2.7cxx11abiTRUE-cp312-cp312-linux_x86_64.whl
    # RiNALMo/RNA-FM transformers-native mirror; era-matched to transformers 4.57.5:
    - multimolecule==0.0.9
